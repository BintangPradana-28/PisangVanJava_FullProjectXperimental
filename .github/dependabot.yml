# ADDITION (QA & Security audit): sebelumnya tidak ada bot update dependency otomatis —
# kerentanan di package pihak ketiga hanya akan diketahui kalau ada yang audit manual.
version: 2
updates:
  # npm/pnpm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Kelompokkan patch/minor update non-major jadi satu PR supaya tidak membanjiri,
      # tapi tetap pisahkan major version update (breaking change) jadi PR sendiri-sendiri
      # agar bisa direview lebih hati-hati.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions versions (mis. actions/checkout, github/codeql-action)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"

  # Docker base image (node:20-alpine di Dockerfile)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
