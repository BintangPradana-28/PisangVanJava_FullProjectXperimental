name: Database Backup Automation

on:
  schedule:
    # Run daily at 17:00 UTC (which is 00:00 WIB/Western Indonesian Time)
    - cron: "0 17 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  backup:
    name: Create Encrypted Database Backup
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Node.js
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v3
        with:
          version: 9

      - name: Install dependencies
        working-directory: ./pisang-van-java
        run: pnpm install --frozen-lockfile

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run Backup Script
        working-directory: ./pisang-van-java
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: npx tsx scripts/backup.ts

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@26f96dfa697d77e81fd5907df203aa23a56210a8 # v4.3.0
        with:
          name: encrypted-database-backup
          path: pisang-van-java/backups/pvj-backup-*.sql.enc
          retention-days: 30
          if-no-files-found: error
