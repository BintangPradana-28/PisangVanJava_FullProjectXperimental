name: Database Backup Automation

on:
  schedule:
    # Run daily at 17:00 UTC (which is 00:00 WIB/Western Indonesian Time)
    - cron: "0 17 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  backup:
    name: Create Encrypted Database Backup
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./pisang-van-java
        run: bun install --frozen-lockfile

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run Backup Script
        working-directory: ./pisang-van-java
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: bun scripts/backup.ts

      - name: Upload Backup Artifact
        uses: actions/upload-artifact@26f96dfa697d77e81fd5907df203aa23a56210a8 # v4.3.0
        with:
          name: encrypted-database-backup
          path: pisang-van-java/backups/pvj-backup-*.sql.enc
          retention-days: 30
          if-no-files-found: error
