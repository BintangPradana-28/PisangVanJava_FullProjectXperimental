name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  security-audit-and-test:
    name: Security Audit & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 11

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.17.9
        with:
          path: ./pisang-van-java
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
          retention-days: 90

      - name: Run Prisma Generate
        working-directory: pisang-van-java
        run: pnpm prisma generate

      - name: Prisma Schema Validation & Format Check
        working-directory: pisang-van-java
        run: |
          pnpm prisma validate
          pnpm prisma format --check

      - name: Linting (Static Analysis)
        working-directory: pisang-van-java
        run: pnpm run lint:biome || true

      - name: TypeScript Type Check
        working-directory: pisang-van-java
        run: npx tsc --noEmit

      - name: Next.js Production Build
        working-directory: pisang-van-java
        run: pnpm run build
        env:
          SKIP_ENV_VALIDATION: "true"

      - name: Enforce Bundle Size Budget
        working-directory: pisang-van-java
        run: node scripts/check-bundle-budget.js

      # ── ADDITION (QA & Security): step di bawah ini sebelumnya TIDAK ADA meski job
      # ini sudah dinamai "Security Audit & Unit Tests" — tool-nya (pnpm audit, depcheck,
      # secretlint) sudah ada di package.json tapi tidak pernah benar-benar dipanggil di CI.
      - name: Dependency Vulnerability Audit
        working-directory: pisang-van-java
        run: pnpm audit --audit-level=high

      - name: Unused/Phantom Dependency Check
        working-directory: pisang-van-java
        run: pnpm depcheck

      - name: Architecture boundaries (dependency-cruiser)
        working-directory: pisang-van-java
        run: pnpm depcruise

      - name: Secret Scanning (CI backstop)
        # Backstop di CI karena pre-commit hook (.husky/pre-commit) bisa dilewati dengan
        # `git commit --no-verify` atau kalau seseorang clone tanpa install husky.
        working-directory: pisang-van-java
        run: pnpm secretlint

      - name: Security & Unit Tests (with coverage)
        working-directory: pisang-van-java
        run: pnpm test:coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: coverage-report
          path: pisang-van-java/coverage/
          retention-days: 14

      - name: Install Playwright Browsers
        working-directory: pisang-van-java
        run: npx playwright install --with-deps

      - name: E2E Tests (Playwright)
        working-directory: pisang-van-java
        run: pnpm test:e2e

  container-scan:
    name: Container Image Vulnerability Scan
    runs-on: ubuntu-latest
    # ADDITION (QA & Security): Dockerfile ada di repo untuk self-hosting, tapi image-nya
    # sebelumnya tidak pernah di-scan untuk CVE pada base image / OS packages.
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build Docker Image
        working-directory: pisang-van-java
        run: docker build -t pisang-van-java:ci-scan .

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "pisang-van-java:ci-scan"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true
