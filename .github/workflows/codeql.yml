# ADDITION (QA & Security audit): SAST (Static Application Security Testing).
# Sebelumnya proyek ini hanya punya linting umum (Biome) — tidak ada analisis statis
# yang secara spesifik mendeteksi pola kerentanan (mis. injection, penggunaan API tidak
# aman, dsb). CodeQL adalah tool SAST resmi GitHub, gratis untuk repo publik/private
# dengan GitHub Advanced Security, dan tidak butuh secret/API key tambahan untuk setup dasar.
name: CodeQL SAST

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Scan terjadwal mingguan untuk menangkap kerentanan baru yang ditemukan di library/
    # pola kode yang sudah ada, bukan cuma saat ada perubahan kode.
    - cron: "17 3 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
