name: DAST Scanning

on:
  schedule:
    # Weekly on Monday at 03:00 UTC (10:00 WIB)
    - cron: "0 3 * * 1"
  workflow_dispatch: {}

jobs:
  dast:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://pisang-van-java-full-project-vg1z.vercel.app/"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          fail_action: false # Report findings without failing the build, allowing review in Security tab
