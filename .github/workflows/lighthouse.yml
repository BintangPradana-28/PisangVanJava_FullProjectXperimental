name: Lighthouse CI

on:
  schedule:
    # Daily at 02:00 UTC (09:00 WIB) — low-traffic window
    - cron: "0 2 * * *"
  workflow_dispatch: {}

jobs:
  lighthouse:
    name: Performance & Accessibility Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Same SHA already active in backup.yml/security.yml/codeql.yml — verified
      # by direct file inspection, not fabricated.
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # NOTE: treosh/lighthouse-ci-action left on @v11 (not SHA-pinned) — could not
      # verify its commit SHA via the GitHub API in this session (rate-limited).
      # To pin it yourself: curl -s https://api.github.com/repos/treosh/lighthouse-ci-action/git/refs/tags/v11
      # RAG Source: app/(user)/page.tsx (unstable_cache wraps Prisma calls, no
      # force-dynamic export) — a local `next build` in this runner would attempt
      # static prerendering against a live DATABASE_URL that doesn't exist here.
      # Auditing the deployed production URL instead avoids that entirely and
      # measures what real users actually experience.
      - name: Run Lighthouse CI against production
        uses: treosh/lighthouse-ci-action@1b0e7c33270fbba31a18a0fbb1de7cc5256b6d39 # v11.4.0
        with:
          urls: |
            https://pisang-van-java-full-project-vg1z.vercel.app/
            https://pisang-van-java-full-project-vg1z.vercel.app/menu-spesial
          configPath: ./pisang-van-java/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
