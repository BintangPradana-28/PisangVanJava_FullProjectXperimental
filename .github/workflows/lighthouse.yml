name: Lighthouse CI

on:
  schedule:
    # Daily at 02:00 UTC (09:00 WIB) — low-traffic window
    - cron: '0 2 * * *'
  workflow_dispatch: {}

jobs:
  lighthouse:
    name: Performance & Accessibility Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # RAG Source: app/(user)/page.tsx (unstable_cache wraps Prisma calls, no
      # force-dynamic export) — a local `next build` in this runner would attempt
      # static prerendering against a live DATABASE_URL that doesn't exist here.
      # Auditing the deployed production URL instead avoids that entirely and
      # measures what real users actually experience.
      - name: Run Lighthouse CI against production
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://pisang-van-java-full-project-vg1z.vercel.app/
            https://pisang-van-java-full-project-vg1z.vercel.app/menu-spesial
          uploadArtifacts: true
          temporaryPublicStorage: true
          # No score thresholds set yet — this establishes a baseline first.
          # Once a few runs give a realistic number, add a lighthouserc.json
          # with `assert` thresholds so regressions actually fail the run.
