sonar.projectKey=pisang-goreng-van-java
sonar.projectName=Pisang Goreng Van Java
sonar.projectVersion=1.0

sonar.sources=src,app,components,lib
sonar.exclusions=**/node_modules/**,**/.next/**,**/public/**,**/*.test.tsx,**/*.test.ts

sonar.tests=
sonar.test.inclusions=**/*.test.tsx,**/*.test.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Untuk menghubungkan ke server lokal SonarQube, atur sonar.host.url di sisi CI/CD atau CLI:
# sonar.host.url=http://localhost:9000
