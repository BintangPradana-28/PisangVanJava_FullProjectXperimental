packages:
  - "pisang-van-java"

# Semgrep pnpm supply-chain findings:
# - blockExoticSubdeps: prevents transitive deps from installing from untrusted
#   (non-registry) sources like git/tarball URLs buried deep in the dep tree
# - minimumReleaseAge: 10080 minutes = 7 days (pnpm's unit is MINUTES, unlike
#   npm's min-release-age above which is DAYS — confirmed against Semgrep's own
#   two separate remediation texts, not assumed to be the same unit)
# - trustPolicy: no-downgrade prevents a compromised/malicious update from
#   silently downgrading security-relevant settings
blockExoticSubdeps: true
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - "*"
  - "@*/*"
trustPolicy: no-downgrade
trustPolicyExclude:
  - "*"
  - "@*/*"

allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  "@scarf/scarf": false
  "@sentry/cli": true
  "@tree-sitter-grammars/tree-sitter-yaml": true
  argon2: true
  core-js: true
  core-js-pure: false
  esbuild: true
  msw: true
  prisma: true
  protobufjs: true
  sharp: true
  tree-sitter: true
  tree-sitter-json: true

overrides:
  form-data: "^4.0.6"
